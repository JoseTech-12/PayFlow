name: Build and deploy Python project to Azure Function App - payflows-functions

on:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.11'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd src
          mkdir -p .python_packages/lib/python3.11/site-packages
          pip install --target=".python_packages/lib/python3.11/site-packages" -r requirements.txt

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_265FF06B19E84145803E6A56F8852FA7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4CFD842A251F4B9688D68721875F510D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F7068722A6A44DF9AE45E338477B6E7C }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'payflows-functions'
          package: './src'
          scm-do-build: false